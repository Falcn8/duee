services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_PORT: 8000
      TRUST_PROXY: 0
      DEBUG_LOCAL_STORAGE: ${DEBUG_LOCAL_STORAGE:-0}
      SESSION_SECRET: duee-local-dev-session-secret-change-me
      SESSION_TTL_DAYS: 30
      COOKIE_SECURE: 0
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: duee
      DB_PASSWORD: duee123
      DB_NAME: duee
      DB_CONNECTION_LIMIT: 10
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: duee
      MYSQL_USER: duee
      MYSQL_PASSWORD: duee123
      MYSQL_ROOT_PASSWORD: root123
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -uroot -proot123 --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    ports:
      - "3307:3306"
    volumes:
      - duee_local_mysql_data:/var/lib/mysql

volumes:
  duee_local_mysql_data:
